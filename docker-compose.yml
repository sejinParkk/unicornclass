services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: unicornclass_php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  db:
    image: mariadb:10.11
    container_name: unicornclass_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: unicornclass
      MYSQL_USER: unicorn
      MYSQL_PASSWORD: unicorn1234
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: unicornclass_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: unicorn
      PMA_PASSWORD: unicorn1234
    depends_on:
      - db

volumes:
  db_data:
